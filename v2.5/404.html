<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — West Bengal Accountability Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --saffron: #E8620A;
      --saffron-dark: #B84A00;
      --saffron-pale: #FFF6EE;
      --saffron-mid: #FFD5AA;
      --ink: #1A1208;
      --ink-mid: #4A3020;
      --ink-light: #6B5540;
      --ink-faint: #9C8878;
      --paper: #FDFAF5;
      --paper-warm: #F7F0E4;
      --surface: #FFFFFF;
      --rule-light: #EDE5D8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--paper);
      color: var(--ink);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      background: var(--surface);
      border: 1px solid var(--rule-light);
      border-radius: 8px;
      padding: 48px 32px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(26, 18, 8, 0.03);
      border-top: 4px solid var(--saffron);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.5s ease-out;
    }

    .error-code {
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--saffron);
      background: var(--saffron-pale);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--saffron-mid);
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--ink);
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: var(--ink-light);
      max-width: 400px;
    }

    .btn-home {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--saffron-dark);
      background: var(--saffron-pale);
      border: 1px solid var(--saffron-mid);
      padding: 12px 24px;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-home:hover {
      background: var(--saffron-mid);
      border-color: var(--saffron);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(232, 98, 10, 0.1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="error-code">Error 404</div>
    <h1>Information Not Found</h1>
    <p>The promise details, update history, or document path you typed does not exist or has not yet reached the
      required resolution threshold to be compiled.</p>
    <a onclick="goToHome()" class="btn-home">← Return to Dashboard</a>
  </div>

  <script>
    function goToHome() {
      // Intelligently resolve home directory path to support both deep local subfolders and root hosting domains
      const path = window.location.pathname;
      if (path.includes('/details/')) {
        window.location.href = path.split('/details/')[0] + '/index.html';
      } else if (path.includes('/files/')) {
        window.location.href = path.split('/files/')[0] + '/index.html';
      } else {
        window.location.href = '/index.html';
      }
    }
  </script>

</body>

</html>
