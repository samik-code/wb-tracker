<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What are you even looking for? — WB Accountability Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0905;
      --surface: #1a1208;
      --saffron: #E8620A;
      --ink-light: #9c8878;
      --text: #f7f0e4;
      --rule: rgba(221, 208, 188, 0.15);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      overflow: hidden;
      text-align: center;
    }
    
    .container {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 40px 24px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      border-top: 4px solid var(--saffron);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.4;
      color: var(--text);
    }
    
    .gif-wrap {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--rule);
      aspect-ratio: 16 / 9;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .gif-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .btn-back {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--saffron);
      text-decoration: none;
      border: 1px solid rgba(232, 98, 10, 0.3);
      padding: 10px 20px;
      border-radius: 4px;
      background: rgba(232, 98, 10, 0.03);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .btn-back:hover {
      background: rgba(232, 98, 10, 0.1);
      border-color: var(--saffron);
      transform: translateY(-1px);
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>What are you even looking for?</h1>
    <div class="gif-wrap">
      <img src="../stop-searching.gif" alt="Stop searching">
    </div>
    <a href="../../index.html" class="btn-back">← Back to Tracker</a>
  </div>

</body>
</html>
